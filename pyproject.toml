[tool.poetry]
name = "MultiDirectory"
version = "2.0.1"
description = ""
authors = ["Mastermind-U <rex49513@gmail.com>"]
readme = "README.md"
packages = [{include = "app"}]

[tool.poetry.dependencies]
python = "3.12.6"
alembic = "^1.14.1"
asn1 = "^2.7.1"
asyncstdlib = "^3.10.6"
bcrypt = "4.0.1"
dishka = "^1.4.2"
dnspython = "^2.7.0"
fastapi = "^0.115.0"
httpx = "^0.27.2"
jinja2 = "^3.1.4"
ldap-filter = "^1.0.1"
loguru = "^0.7.2"
passlib = {extras = ["bcrypt"], version = "^1.7.4"}
psycopg = {extras = ["binary", "pool"], version = "^3.2.3"}
pydantic = "^2.9.2"
pydantic-settings = "^2.6.1"
python-jose = {extras = ["cryptography"], version = "^3.3.0"}
python-multipart = "^0.0.17"
pytz = "^2025.1"
redis = "^5.2.1"
sqlalchemy = {extras = ["asyncio", "mypy"], version = "^2.0.35"}
uvicorn = "^0.32.0"
uvloop = "^0.21.0"
websockets = "^14.0"
gssapi = "^1.9.0"
backoff = "^2.2.1"

[tool.poetry.group.linters.dependencies]
flake8 = "7.1.1"
flake8-awesome = "^1.3.0"
flake8-commas = "^4.0.0"
flake8-docstrings = "^1.6.0"
flake8-isort = "^6.1.1"
flake8-pytest = "^1.4"
isort = "^5.13.2"
mypy = "^1.13.0"
ruff = "0.9.5"
types-pytz = "^2022.7.1.0"

[tool.poetry.group.test.dependencies]
coverage = "7.6.4"
gevent = "^24.10.3"
ldap3 = "^2.9.1"
pytest = "^8.3.3"
pytest-asyncio = "^0.24.0"
pytest-cov = "^4.1.0"

[tool.poetry.group.dev.dependencies]
py-hot-reload = "^1.0.6"
watchdog = "4.0.2"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.mypy]
plugins = ["sqlalchemy.ext.mypy.plugin", "pydantic.mypy"]
ignore_missing_imports = true
platform = "linux"
disallow_untyped_defs = true
exclude = ["app/alembic", "alembic"]
show_column_numbers = true
pretty = true
warn_unreachable = true
color_output = true
warn_unused_ignores = true

[tool.pytest.ini_options]
pythonpath = ["app"]
addopts = [
    "--cov",
    "--cov-report=term-missing:skip-covered"
]
asyncio_mode = "auto"

[tool.coverage.report]
show_missing = true

[tool.coverage.run]
concurrency = ["thread", "gevent"]


# RUFF
# ruff format .
# ruff check .
# ruff check . --preview
# ruff check . --fix --unsafe-fixes
# ruff check . --extend-select RUF100 --fix --unsafe-fixes
[tool.ruff]
target-version = "py312"
line-length = 79
output-format = "grouped"
unsafe-fixes = true

[tool.ruff.format]
docstring-code-format = true
docstring-code-line-length = 79
line-ending = "lf"
skip-magic-trailing-comma = false  # default: false

[tool.ruff.lint]
select = [
    "F",  # Pyflakes
    "E",  # pycodestyle (Error), check tool.ruff.lint.pycodestyle
    "W",  # pycodestyle (Warnings), check tool.ruff.lint.pycodestyle
    "C90",  # mccabe (max_complexity), check tool.ruff.lint.mccabe
    "I",  # isort, check tool.ruff.lint.isort
    "N",  # pep8-naming
    "D",  # pydocstyle, check tool.ruff.lint.pydocstyle
    "UP",  # pyupgrade, check tool.ruff.lint.pyupgrade
    "ANN",  # flake8-annotations, check tool.ruff.lint.flake8-annotations
    "ASYNC",  # flake8-async
    "S",  # flake8-bandit
    "COM",  # flake8-commas
    "CPY",  # flake8-copyright
    "PIE",  # flake8-pie
    "PYI",  # flake8-pyi
    "Q",  # flake8-quotes
    "RET",  # flake8-return
    "SLF",  # flake8-self
    "SIM",  # flake8-simplify
    "TC",  # flake8-type-checking, check flake8-type-checking
    "ARG",  # flake8-unused-arguments
    "TD",  # flake8-todos
    "ERA",  # eradicate
    "PGH",  # pygrep-hooks
    "PL",  # Pylint
    "DOC",  # pydoclint
    "RUF",  # Ruff-specific rules
]

# Gradually remove all values marked TODO and fix errors.
ignore = [
    "D",  # TODO delete that and fix all errors
    "UP007",  # TODO delete that and fix all errors
    "UP015",  # TODO delete that and fix all errors
    "UP017",  # TODO delete that and fix all errors
    "UP032",  # TODO delete that and fix all errors
    "UP034",  # TODO delete that and fix all errors
    "UP035",  # we allowed deprecated import
    "UP037",  # TODO delete that and fix all errors
    "UP040",  # TODO delete that and fix all errors
    "ANN001",  # TODO delete that and fix all errors
    "ANN002",
    "ANN003",
    "ANN401",  # TODO delete that and fix all errors
    "ASYNC",  # TODO delete that and fix all errors
    "S311",  # TODO delete that and fix all errors
    "COM812",  # cause conflicts when used with the formatter
    "CPY",  # TODO delete that and fix all errors
    "PIE",  # TODO delete that and fix all errors
    "PYI",  # TODO delete that and fix all errors
    "Q",  # TODO delete that and fix all errors
    "RET",  # TODO delete that and fix all errors
    "SLF",  # TODO delete that and fix all errors
    "SIM",  # TODO delete that and fix all errors
    "TC",  # TODO delete that and fix all errors
    "ARG",  # TODO delete that and fix all errors
    "TD",  # TODO delete that and fix all errors
    "ERA",  # TODO delete that and fix all errors
    "PGH",  # does we need it?
    "PL",  # TODO delete that and fix all errors
    "DOC",  # TODO delete that and fix all errors
    "RUF",  # TODO delete that and fix all errors
]
extend-select = []

fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
# Ignore `S` rules for the `tests/` directory.
"tests/*.py" = ["S"]

[tool.ruff.lint.mccabe]
# 23 Complexity level is too high, need to reduce this level
# or ignore it `# noqa: C901`.
max-complexity = 23

[tool.ruff.lint.pycodestyle]

[tool.ruff.lint.isort]
known-first-party = [
    "ldap_protocol",
    "client",
    "config",
    "models",
    "api",
    "security",
    "tests",
    "web_app",
    "ioc",
    "schedule",
    "extra",
]
split-on-trailing-comma = false
combine-as-imports = true

[tool.ruff.lint.pep8-naming]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.pyupgrade]

[tool.ruff.lint.flake8-annotations]
suppress-dummy-args = true
suppress-none-returning = true

[tool.ruff.lint.flake8-type-checking]
quote-annotations = true
